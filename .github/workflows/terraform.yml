name: "Terraform CI/CD"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        if: github.event_name == 'pull_request'
        run: terraform plan -var-file="prod.tfvars" -no-color
        continue-on-error: false

      - name: Cleanup Orphaned Azure Resources
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          az login --service-principal -u ${{ secrets.ARM_CLIENT_ID }} -p ${{ secrets.ARM_CLIENT_SECRET }} --tenant ${{ secrets.ARM_TENANT_ID }}
          az account set -s ${{ secrets.ARM_SUBSCRIPTION_ID }}
          az network application-gateway delete -g Aravind-RG -n appgw-waf --no-wait || true
          az network application-gateway delete -g Aravind-RG -n appgw-belgium --no-wait || true
          az network public-ip delete -g Aravind-RG -n pip-appgw --no-wait || true
          az network public-ip delete -g Aravind-RG -n pip-appgw-belgium --no-wait || true

      - name: Cleanup Orphaned Terraform State
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          terraform state rm module.vnet.azurerm_application_gateway.appgw || true
          terraform state rm module.vnet.azurerm_public_ip.appgw_pip || true
          terraform state rm module.vnet.azurerm_public_ip.appgw || true

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -var-file="prod.tfvars"
